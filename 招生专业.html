<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>招生专业</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        body{
            background: url("123.jpg") no-repeat center center;
            background-size: cover;
            background-attachment: fixed;
        }
        .box{
            width: 800px;
            margin: 40px auto;
            background: rgba(255,255,255,0.75);
            border-radius: 25px;
            padding: 50px;
        }
        h1{
            text-align: center;
            color: #006ce9;
            margin-bottom: 35px;
        }
        p{
    font-size: 17px;
    line-height: 2;
    text-indent: 2em;
    color: #FF0004;
    margin-bottom: 20px;
    text-align: center;
        }
        .back{
            display: block;
            width: 200px;
            height: 60px;
            line-height: 60px;
            background-color: rgba(0, 108, 233, 0.65);
            color: #fff;
            text-align: center;
            text-decoration: none;
            border-radius: 18px;
            margin: 0 auto 30px;
            border: 2px dashed rgba(255,255,255,0.5);
            transition: all 0.25s ease;
        }
        .back:hover{
            background-color: rgba(0, 108, 233, 0.85);
            transform: translateY(-3px);
        }
        .back:active{
            transform: translateY(1px);
        }
    </style>
</head>
<body>
    <a href="index.html" class="back">返回首页</a>
<div class="box">
      <h1>招生信息网</h1>
      <p>正在技术维护中，暂未开放</p
      <p>&nbsp;</p>
<p>&nbsp;</p>
<span style="text-align: center; color: #000000;">©大豫通宝研究学院</span></div>
</body>
</html>
