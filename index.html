<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>大豫通宝学院导航</title>
    <style>
        /* 全局页面背景 123.jpg */
        body {
            /* 引入你的背景图123.jpg */
            background: url("123.jpg") no-repeat center center;
            /* 背景铺满全屏、随页面缩放不变形 */
            background-size: cover;
            /* 背景固定，滚动时不动 */
            background-attachment: fixed;
        }

        .down {
            display: block;
            width: 600px;
            height: 90px;
            line-height: 90px;
            /* 半透蓝色圆角按钮，背景图可以透过来 */
            background-color: rgba(0, 108, 233, 0.65);
            color: #ffffff;
            text-decoration: none;
            /* 圆润大边角 */
            border-radius: 18px;
            font-size: 30px;
            font-weight: normal;
            margin: 15px auto;
            border: 2px dashed rgba(255, 255, 255, 0.5);

            /* 顺滑过渡动画 */
            transition: all 0.25s ease;
            cursor: pointer;
            user-select: none;
        }

        /* 鼠标悬浮效果 */
        .down:hover {
            background-color: rgba(0, 108, 233, 0.85);
            transform: translateY(-3px);
            box-shadow: 0 8px 18px rgba(0, 108, 233, 0.4);
        }

        /* 点击按压效果 */
        .down:active {
            transform: translateY(1px);
            background-color: rgba(0, 63, 150, 0.95);
            box-shadow: 0 3px 8px rgba(0, 108, 233, 0.3);
        }
    </style>
</head>

</body>
</html>
