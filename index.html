<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>个人主页</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: "微软雅黑", sans-serif;
    background: #0f172a;
    min-height: 100vh;
}

/* 密码全屏遮罩 最高层级 一开始必显示 */
#login-screen {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background-color: #111120;
    z-index: 99999;
    display: flex;
    align-items: center;
    justify-content: center;
}

.login-card {
    background: #1e1e35;
    padding: 45px 35px;
    border-radius: 16px;
    text-align: center;
    box-shadow: 0 0 30px rgba(80, 100, 255, 0.2);
}

.login-card h2 {
    color: #ffffff;
    margin-bottom: 25px;
}

#password-input {
    width: 100%;
    padding: 12px;
    margin-bottom: 15px;
    border: none;
    border-radius: 8px;
    background: #2b2b4a;
    color: #fff;
    font-size: 16px;
    outline: none;
}

#submit-btn {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: #5856d6;
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.2s;
}

#submit-btn:hover {
    background: #706ef0;
}

#error-text {
    margin-top: 12px;
    color: #ff4d4d;
    font-size: 13px;
}

/* 主页 一开始直接隐藏 */
#main-content {
    width: 100%;
    min-height: 100vh;
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    color: #ffffff;
}

#main-content h1 {
    font-size: 42px;
    margin-bottom: 10px;
}

#main-content p {
    font-size: 22px;
    opacity: 0.85;
}
</style>
</head>
<body>

<!-- 密码层 -->
<div id="login-screen">
    <div class="login-card">
        <h2>请输入密码</h2>
        <input type="password" id="password-input" placeholder="输入访问密码">
        <button id="submit-btn">确认进入</button>
        &nbsp; &nbsp; &nbsp; &nbsp; &nbsp;c
        <div id="error-text"></div>
    </div>
</div>

<!-- 主页内容（初始完全隐藏） -->
<div id="main-content">
    <h1>欢迎来到主页</h1>
    <p><a href="软件站.html">点击跳转</a></p>
</div>

<script>
// 在这里修改你的密码
const PASSWORD = "kdmxnkzk";

const loginScreen = document.getElementById("login-screen");
const mainContent = document.getElementById("main-content");
const passInput = document.getElementById("password-input");
const submitBtn = document.getElementById("submit-btn");
const errorText = document.getElementById("error-text");

// 验证逻辑
function checkPass() {
    errorText.textContent = "";
    if(passInput.value.trim() === PASSWORD){
        // 密码正确：移除密码层，显示主页
        loginScreen.style.display = "none";
        mainContent.style.display = "flex";
    }else{
        errorText.textContent = "你想小有吗，好好嘞输入";
        passInput.value = "";
        passInput.focus();
    }
}

// 点击按钮验证
submitBtn.addEventListener("click", checkPass);

// 按回车也能验证
passInput.addEventListener("keydown", function(e){
    if(e.key === "Enter") checkPass();
});
</script>

</body>
</html>
