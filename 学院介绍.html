      <h1><strong>学院介绍 </strong></h1>
        <h1><strong>我校是致力于研究，夏朝至现代大豫地区古豫人传统与古豫币发掘</strong></h1>
        <h1><strong>研究地域横跨：平原，山地，丘陵，盆地</strong></h1>
        <h1>研究朝代跨越 ： 夏朝，商朝，西周，东周，曹魏，西晋，北魏，隋，唐，后梁，后唐，后晋。从夏朝阳城（现河南登封）至今郑州市</h1>
      <p> </p>
        <h1>建校史</h1>
      <p>我校最早建立于民国十一年，由蒋中正校长设立，是最早加入国际古钱币历史研究学会的一批学院。</p>
      <p>我校还是改革开放后的第一批高等本科学府。如今我校从洛阳搬迁至单父的家乡单县 </p>
      <p>如今坐落在这个国家园林级县城，在曹铮秧校长的带领下，我校必定欣欣向荣</p>
